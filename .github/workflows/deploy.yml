name: 🚀 自动部署到服务器

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🔑 加载 SSH 密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚚 通过 rsync 同步到服务器
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.vscode' \
            --exclude='.claude' \
            --exclude='.reasonix' \
            --exclude='data/products.json' \
            --exclude='data/password.hash' \
            --exclude='uploads/' \
            --exclude='nginx-config-snippet.conf' \
            --exclude='*.zip' \
            --exclude='.gitignore' \
            --exclude='.github/' \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || '22' }}" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/www/wwwroot/114.55.208.72/

      - name: ✅ 设置文件权限
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            chmod -R 755 /www/wwwroot/114.55.208.72
            chmod 644 /www/wwwroot/114.55.208.72/*.html
            chmod 644 /www/wwwroot/114.55.208.72/*.php
            echo "✅ 部署完成！" 
