<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 | Smart Hardware Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" />
</head>
<body class="admin-body">

  <!-- ==================== 登录界面 ==================== -->
  <div class="admin-login" id="loginPanel">
    <div class="admin-login-card">
      <div class="admin-login-header">
        <div class="admin-login-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1>管理后台</h1>
        <p>请输入管理员密码以继续</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="admin-input-group">
          <label for="adminPassword">管理员密码</label>
          <input type="password" id="adminPassword" placeholder="请输入密码" required />
        </div>
        <button type="submit" class="admin-btn admin-btn-primary admin-btn-full">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          登录
        </button>
        <p class="admin-login-hint">默认密码: admin123</p>
      </form>
      <div id="loginError" class="admin-error" style="display:none;"></div>
    </div>
  </div>

  <!-- ==================== 管理面板 ==================== -->
  <div class="admin-panel" id="adminPanel" style="display:none;">

    <!-- 侧边栏 -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/></svg>
        <span>管理后台</span>
      </div>
      <nav class="admin-nav">
        <a href="#" class="admin-nav-item active" data-tab="products">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          产品管理
        </a>
        <a href="#" class="admin-nav-item" data-tab="add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          添加产品
        </a>
        <a href="#" class="admin-nav-item" data-tab="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68 1.65 1.65 0 0 0 10 3.17V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          系统设置
        </a>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="index.html" class="admin-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          返回首页
        </a>
        <a href="#" class="admin-nav-item" id="logoutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          退出登录
        </a>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="admin-main">

      <!-- Tab: 产品列表 -->
      <div class="admin-tab active" id="tab-products">
        <div class="admin-page-header">
          <h2>产品管理</h2>
          <button class="admin-btn admin-btn-primary" id="gotoAddBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            添加产品
          </button>
        </div>
        <div class="admin-stats-row">
          <div class="admin-stat-card">
            <div class="admin-stat-num" id="statTotal">0</div>
            <div class="admin-stat-label">总产品数</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-num" id="statFeatured">0</div>
            <div class="admin-stat-label">核心产品</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-num" id="statImages">0</div>
            <div class="admin-stat-label">已上传图片</div>
          </div>
        </div>
        <div class="admin-product-list" id="productList">
          <!-- 动态渲染 -->
        </div>
      </div>

      <!-- Tab: 添加/编辑产品 -->
      <div class="admin-tab" id="tab-add">
        <div class="admin-page-header">
          <h2 id="formTitle">添加新产品</h2>
        </div>
        <form id="productForm" class="admin-form">
          <input type="hidden" id="editId" value="" />

          <div class="admin-form-grid">
            <div class="admin-form-col">
              <div class="admin-input-group">
                <label for="prodName">产品名称 *</label>
                <input type="text" id="prodName" placeholder="例: 智能温控系统" required />
              </div>
              <div class="admin-input-group">
                <label for="prodSubtitle">产品副标题</label>
                <input type="text" id="prodSubtitle" placeholder="一句话描述核心卖点" />
              </div>
              <div class="admin-input-group">
                <label for="prodCategory">产品分类</label>
                <select id="prodCategory">
                  <option value="机器人">机器人</option>
                  <option value="智能家居">智能家居</option>
                  <option value="物联网">物联网</option>
                  <option value="视觉识别">视觉识别</option>
                  <option value="医疗辅助">医疗辅助</option>
                  <option value="工业控制">工业控制</option>
                  <option value="音频设备">音频设备</option>
                  <option value="安防监控">安防监控</option>
                  <option value="其他">其他</option>
                </select>
              </div>
              <div class="admin-input-group">
                <label for="prodTags">技术标签（逗号分隔）</label>
                <input type="text" id="prodTags" placeholder="STM32, ESP32, PID控制" />
              </div>
              <div class="admin-input-group">
                <label>产品级别</label>
                <div class="admin-radio-group">
                  <label class="admin-radio"><input type="radio" name="prodLevel" value="featured" /> 核心产品（首页展示）</label>
                  <label class="admin-radio"><input type="radio" name="prodLevel" value="normal" checked /> 普通项目</label>
                </div>
              </div>
            </div>

            <div class="admin-form-col">
              <div class="admin-input-group">
                <label for="prodDesc">产品描述 *</label>
                <textarea id="prodDesc" rows="4" placeholder="详细描述产品功能、技术方案等" required></textarea>
              </div>
              <div class="admin-input-group">
                <label for="prodSpecs">技术参数（每行一条，用 | 分隔名称和值）</label>
                <textarea id="prodSpecs" rows="4" placeholder="主控芯片|STM32F103C8T6&#10;通信方式|WiFi + MQTT&#10;传感器|DHT11温湿度"></textarea>
              </div>
              <div class="admin-input-group">
                <label>产品图片</label>
                <div class="admin-upload-area" id="uploadArea">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  <p>点击或拖拽上传图片</p>
                  <span>支持 JPG / PNG，建议 800×600</span>
                  <input type="file" id="imageInput" accept="image/*" multiple style="display:none;" />
                </div>
                <div class="admin-image-preview" id="imagePreview"></div>
              </div>
            </div>
          </div>

          <div class="admin-form-actions">
            <button type="submit" class="admin-btn admin-btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              保存产品
            </button>
            <button type="button" class="admin-btn admin-btn-outline" id="cancelEditBtn">取消</button>
          </div>
        </form>
      </div>

      <!-- Tab: 系统设置 -->
      <div class="admin-tab" id="tab-settings">
        <div class="admin-page-header">
          <h2>系统设置</h2>
        </div>
        <div class="admin-settings-card">
          <h3>修改管理员密码</h3>
          <form id="passwordForm" class="admin-form">
            <div class="admin-input-group">
              <label for="oldPassword">当前密码</label>
              <input type="password" id="oldPassword" required />
            </div>
            <div class="admin-input-group">
              <label for="newPassword">新密码</label>
              <input type="password" id="newPassword" required minlength="4" />
            </div>
            <div class="admin-input-group">
              <label for="confirmPassword">确认新密码</label>
              <input type="password" id="confirmPassword" required minlength="4" />
            </div>
            <button type="submit" class="admin-btn admin-btn-primary">更新密码</button>
          </form>
        </div>
        <div class="admin-settings-card">
          <h3>首页展示图片</h3>
          <p class="admin-settings-desc">管理首页右侧的三张展示图片，支持上传新图片替换。</p>
          <div class="hero-images-grid" id="heroImagesGrid">
            <div class="hero-img-slot" data-slot="0">
              <div class="hero-img-preview" id="heroPreview0">
                <span class="hero-img-label">图片 1（主图）</span>
              </div>
              <button type="button" class="admin-btn admin-btn-outline admin-btn-sm hero-upload-btn" data-slot="0">更换图片</button>
            </div>
            <div class="hero-img-slot" data-slot="1">
              <div class="hero-img-preview" id="heroPreview1">
                <span class="hero-img-label">图片 2</span>
              </div>
              <button type="button" class="admin-btn admin-btn-outline admin-btn-sm hero-upload-btn" data-slot="1">更换图片</button>
            </div>
            <div class="hero-img-slot" data-slot="2">
              <div class="hero-img-preview" id="heroPreview2">
                <span class="hero-img-label">图片 3</span>
              </div>
              <button type="button" class="admin-btn admin-btn-outline admin-btn-sm hero-upload-btn" data-slot="2">更换图片</button>
            </div>
          </div>
          <input type="file" id="heroFileInput" accept="image/*" style="display:none;" />
          <button type="button" class="admin-btn admin-btn-primary" id="saveHeroBtn" style="margin-top:12px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            保存展示图片
          </button>
        </div>
        <div class="admin-settings-card">
          <h3>数据管理</h3>
          <p class="admin-settings-desc">导出或导入产品数据（JSON格式），方便备份和迁移。</p>
          <div class="admin-btn-row">
            <button class="admin-btn admin-btn-outline" id="exportDataBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              导出数据
            </button>
            <button class="admin-btn admin-btn-outline" id="importDataBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              导入数据
            </button>
            <input type="file" id="importFileInput" accept=".json" style="display:none;" />
          </div>
        </div>
        <div class="admin-settings-card admin-settings-danger">
          <h3>危险操作</h3>
          <p class="admin-settings-desc">清空所有产品数据，此操作不可恢复。</p>
          <button class="admin-btn admin-btn-danger" id="clearDataBtn">清空所有数据</button>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast 通知 -->
  <div class="admin-toast-container" id="toastContainer"></div>

  <!-- 图片裁剪弹窗 -->
  <div class="crop-modal" id="cropModal" style="display:none;">
    <div class="crop-modal-backdrop"></div>
    <div class="crop-modal-content">
      <div class="crop-modal-header">
        <h3>裁剪图片</h3>
        <button class="crop-modal-close" id="cropCancel">&times;</button>
      </div>
      <div class="crop-modal-body">
        <div class="crop-container">
          <img id="cropImage" src="" alt="裁剪预览" />
        </div>
      </div>
      <div class="crop-modal-footer">
        <div class="crop-ratio-btns">
          <button type="button" class="admin-btn admin-btn-outline crop-ratio-btn active" data-ratio="free">自由</button>
          <button type="button" class="admin-btn admin-btn-outline crop-ratio-btn" data-ratio="1">1:1</button>
          <button type="button" class="admin-btn admin-btn-outline crop-ratio-btn" data-ratio="1.333">4:3</button>
          <button type="button" class="admin-btn admin-btn-outline crop-ratio-btn" data-ratio="1.778">16:9</button>
          <button type="button" class="admin-btn admin-btn-outline crop-ratio-btn" data-ratio="0.75">3:4</button>
        </div>
        <div class="crop-action-btns">
          <button type="button" class="admin-btn admin-btn-outline" id="cropSkip">跳过裁剪</button>
          <button type="button" class="admin-btn admin-btn-primary" id="cropConfirm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
            确认裁剪
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
