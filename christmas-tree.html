<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>圣诞梦境：3D 手势粒子照片树 | Smart Hardware Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  
  <!-- CDNs for Three.js, MediaPipe Hands & Camera -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --c-christmas-green: #0a1f12;
      --c-christmas-red: #c22929;
      --c-christmas-gold: #dfa12a;
      --font-display: "Cinzel", "Inter", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--c-christmas-green);
      color: #f1f5f9;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* Cinematic background vignetting */
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      background: radial-gradient(circle at center, #0f2c1b 0%, #040d07 100%);
    }

    /* Camera View overlay - Floating HUD style */
    .hud-cam-overlay {
      position: absolute;
      top: 25px;
      right: 25px;
      width: 150px;
      height: 110px;
      border: 1px solid var(--c-christmas-gold);
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
      background: #000;
      box-shadow: 0 0 25px rgba(223, 161, 42, 0.2);
      transform: scaleX(-1);
    }

    .hud-cam-overlay video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Left Control HUD Dashboard */
    .hud-control-panel {
      position: absolute;
      top: 25px;
      left: 25px;
      z-index: 10;
      max-width: 320px;
      font-family: var(--font-display);
      pointer-events: none;
    }

    .xmas-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 31, 18, 0.7);
      border: 1px solid var(--c-christmas-gold);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--c-christmas-gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 15px rgba(223, 161, 42, 0.15);
      backdrop-filter: blur(10px);
    }

    .xmas-title {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.1;
      margin: 12px 0 6px 0;
      color: #fff;
      text-shadow: 0 0 20px rgba(223, 161, 42, 0.3);
      letter-spacing: 1px;
    }

    .xmas-desc {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
    }

    /* Bottom Status Console */
    .hud-status-bar {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(4, 13, 7, 0.85);
      border: 1px solid rgba(223, 161, 42, 0.3);
      padding: 10px 24px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(15px);
      pointer-events: auto;
    }

    .hud-gesture-state {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--c-christmas-gold);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--c-christmas-red);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .pulse-dot.green {
      background: #22c55e;
      box-shadow: 0 0 10px #22c55e;
    }

    .nav-btn-back {
      background: transparent;
      border: 1px solid var(--c-christmas-gold);
      color: var(--c-christmas-gold);
      padding: 5px 14px;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .nav-btn-back:hover {
      background: var(--c-christmas-gold);
      color: var(--c-christmas-green);
      box-shadow: 0 0 15px var(--c-christmas-gold);
    }

    /* Camera Switcher Button inside HUD */
    .btn-camera-trigger {
      background: rgba(194, 41, 41, 0.2);
      border: 1px solid var(--c-christmas-red);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-camera-trigger:hover {
      background: var(--c-christmas-red);
      box-shadow: 0 0 15px var(--c-christmas-red);
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.6; }
    }

    /* Legend/Instructions overlay */
    .hud-legend {
      position: absolute;
      bottom: 25px;
      left: 25px;
      z-index: 10;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #64748b;
      line-height: 1.6;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .legend-key {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 2px 6px;
      border-radius: 4px;
      color: #cbd5e1;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>

<body>

  <div class="cursor-glow"></div>

  <!-- 3D Canvas Screen -->
  <div id="canvas-container"></div>

  <!-- ==================== HUD: Left Brand & Control Info ==================== -->
  <div class="hud-control-panel">
    <div class="xmas-badge">
      <span class="dot" style="width:6px;height:6px;background:var(--c-christmas-gold);border-radius:50%;display:inline-block;"></span>
      AI Creative WebGL
    </div>
    <h1 class="xmas-title">圣诞粒子梦境<br/>PHOTO CLOUD</h1>
    <p class="xmas-desc">
      挥动双手，唤醒流光。基于 Three.js 粒子引擎与 MediaPipe 骨骼追踪，将经典的硬件手势体感映射到三维粒子圣诞树上。
    </p>
  </div>

  <!-- ==================== HUD: Camera Preview Stream ==================== -->
  <div class="hud-cam-overlay" id="webcamOverlay" style="display:none;">
    <video id="webcam" autoplay playsinline muted></video>
  </div>

  <!-- ==================== HUD: Bottom Operations Bar ==================== -->
  <div class="hud-status-bar">
    <a href="hand-tracking.html" class="nav-btn-back">返回机械臂</a>
    <a href="nebula-hand.html" class="nav-btn-back" style="border-color:var(--c-christmas-red);color:#fca5a5;">🪐 梦境星云</a>
    
    <div class="hud-gesture-state">
      <span class="pulse-dot green" id="statusDot"></span>
      <span id="gestureStateText">鼠标模式 / ACTIVE</span>
    </div>

    <button class="btn-camera-trigger" id="btnToggleCamera">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span>启动 AI 摄像头</span>
    </button>
  </div>

  <!-- ==================== HUD: Legend instructions ==================== -->
  <div class="hud-legend">
    <div class="legend-item"><span class="legend-key">✊ 握拳 / 点击</span> <span>合拢态 - 凝聚旋转圣诞树</span></div>
    <div class="legend-item"><span class="legend-key">🖐️ 张手 / 松开</span> <span>散开态 - 星云扩散粒子云</span></div>
    <div class="legend-item"><span class="legend-key">🤏 捏合 / 双击</span> <span>抓取态 - 放大/吸附拍立得照片</span></div>
    <div class="legend-item"><span class="legend-key">🔄 倾斜 / 拖拽</span> <span>画面物理旋转与空间透视</span></div>
  </div>

  <script>
    // =========================================================================
    // 3D Christmas Tree Particle & Photo Cloud Simulation
    // =========================================================================

    const container = document.getElementById('canvas-container');
    const gestureStateText = document.getElementById('gestureStateText');
    const statusDot = document.getElementById('statusDot');
    const btnToggleCamera = document.getElementById('btnToggleCamera');
    const webcamOverlay = document.getElementById('webcamOverlay');
    const webcamVideo = document.getElementById('webcam');

    let scene, camera, renderer;
    let particleSystem;
    let photoGroup;
    let starMesh;
    const particleCount = 3200;

    // Simulation states: 'folded' | 'scattered' | 'zoomed'
    let xmasState = 'folded'; 
    let stateTransitionProgress = 0.0; // Interpolation progress [0, 1]
    const transitionSpeed = 0.04;

    // Camera orbit parameters
    let targetRotationX = 0;
    let targetRotationY = 0;
    let currentRotationX = 0;
    let currentRotationY = 0;

    // Hand tracking control params
    let isCameraActive = false;
    let cameraInstance = null;
    let rawLandmarks = null;
    let smoothHandRoll = 0.0;
    let activeZoomedPhoto = null;

    // Local assets fallback textures (gorgeous gradients)
    const polaroidImages = [
      'images/hero-main.jpg',
      'images/vision-tracker-main.jpg',
      'images/gesture-arm-board.jpg'
    ];

    // Helper to generate glowing circular canvas texture
    function createGlowTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
      grad.addColorStop(0.2, 'rgba(255, 220, 100, 0.8)');
      grad.addColorStop(0.5, 'rgba(223, 161, 42, 0.25)');
      grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 64, 64);

      return new THREE.CanvasTexture(canvas);
    }

    // Helper to generate a Polaroid-style frame texture with color gradient placeholder
    function createPolaroidTexture(text, url) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 320;
      const ctx = canvas.getContext('2d');

      // 1. Draw Polaroid Base (Metallic Matte white/gold margin)
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(0, 0, 256, 320);
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, 252, 316);

      // 2. Main picture slot (Gradients with neon glowing look)
      const grad = ctx.createLinearGradient(16, 16, 240, 240);
      grad.addColorStop(0, '#0a1f12');
      grad.addColorStop(0.5, '#c22929');
      grad.addColorStop(1, '#dfa12a');
      ctx.fillStyle = grad;
      ctx.fillRect(16, 16, 224, 210);

      // 3. Typographical text at the bottom
      ctx.fillStyle = '#1e293b';
      ctx.font = 'bold 15px "Cinzel"';
      ctx.textAlign = 'center';
      ctx.fillText(text.toUpperCase(), 128, 260);

      ctx.fillStyle = '#64748b';
      ctx.font = '10px "JetBrains Mono"';
      ctx.fillText("SMART HARDWARE LAB", 128, 290);

      return new THREE.CanvasTexture(canvas);
    }

    // Initialize 3D Engine
    function init3D() {
      // 1. Scene setup
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x0a1f12, 0.0055);

      // 2. Camera setup
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.z = 240;
      camera.position.y = 10;

      // 3. Renderer setup
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.25;
      container.appendChild(renderer.domElement);

      // 4. Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);

      const topPointLight = new THREE.PointLight(0xdfa12a, 2.5, 300);
      topPointLight.position.set(0, 120, 0);
      scene.add(topPointLight);

      // 5. Build Particle System (Christmas tree / Star cluster coords)
      buildParticles();

      // 6. Build Photo Cloud
      buildPhotoCloud();

      // 7. Golden Star at the top of the tree
      const starGeometry = new THREE.OctahedronGeometry(12, 0);
      const starMaterial = new THREE.MeshBasicMaterial({
        color: 0xdfa12a,
        wireframe: true,
        transparent: true,
        opacity: 0.8
      });
      starMesh = new THREE.Mesh(starGeometry, starMaterial);
      starMesh.position.y = 105;
      scene.add(starMesh);

      // Add a small point light inside the star
      const starLight = new THREE.PointLight(0xffffff, 3.0, 50);
      starLight.position.copy(starMesh.position);
      scene.add(starLight);

      // Listen for window resize
      window.addEventListener('resize', onWindowResize);
    }

    // Coords Generator for Folded and Scattered states
    let positionsFolded = [];
    let positionsScattered = [];
    let particleColors = [];

    function buildParticles() {
      const geometry = new THREE.BufferGeometry();
      const posArray = new Float32Array(particleCount * 3);
      const colArray = new Float32Array(particleCount * 3);

      const pColors = [
        new THREE.Color('#14532d'), // Christmas Green
        new THREE.Color('#22c55e'), // Neon Green
        new THREE.Color('#dfa12a'), // Star Gold
        new THREE.Color('#c22929')  // Christmas Red
      ];

      for (let i = 0; i < particleCount; i++) {
        // ─── 1. Calculate Folded Coords (Conical spiral Christmas Tree shape) ───
        const heightPercent = i / particleCount; // 0 (bottom) to 1 (top)
        const height = heightPercent * 180 - 90; // y-axis [-90, 90]
        
        // Conical radius: wider at the bottom, zero at the top
        const baseRadius = 65;
        const radius = baseRadius * (1.0 - Math.pow(heightPercent, 1.2));
        
        // Spiral angle rotation
        const spiralRotations = 11.5;
        const theta = heightPercent * Math.PI * 2 * spiralRotations;

        // Position coordinates
        const xF = radius * Math.cos(theta) + (Math.random() - 0.5) * 5.0;
        const yF = height;
        const zF = radius * Math.sin(theta) + (Math.random() - 0.5) * 5.0;

        positionsFolded.push(xF, yF, zF);

        // ─── 2. Calculate Scattered Coords (Expanding Nebula sphere shape) ───
        const sRadius = 150 + Math.random() * 50;
        const u = Math.random();
        const v = Math.random();
        const sTheta = u * 2.0 * Math.PI;
        const sPhi = Math.acos(2.0 * v - 1.0);

        const xS = sRadius * Math.sin(sPhi) * Math.cos(sTheta);
        const yS = sRadius * Math.sin(sPhi) * Math.sin(sTheta);
        const zS = sRadius * Math.cos(sPhi);

        positionsScattered.push(xS, yS, zS);

        // ─── 3. Assign rich colors based on height position ───
        let col = pColors[0]; // Green by default
        if (Math.random() < 0.15) {
          col = pColors[2]; // Gold bulbs
        } else if (Math.random() < 0.22) {
          col = pColors[3]; // Red bells
        } else if (heightPercent > 0.85) {
          col = pColors[2]; // Top section is glowing gold
        }

        colArray[i * 3] = col.r;
        colArray[i * 3 + 1] = col.g;
        colArray[i * 3 + 2] = col.b;

        // Initial setup at folded coords
        posArray[i * 3] = xF;
        posArray[i * 3 + 1] = yF;
        posArray[i * 3 + 2] = zF;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));

      // Glow shader-like particle material
      const material = new THREE.PointsMaterial({
        size: 2.8,
        map: createGlowTexture(),
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        opacity: 0.9
      });

      particleSystem = new THREE.Points(geometry, material);
      scene.add(particleSystem);
    }

    const photoCards = [];
    function buildPhotoCloud() {
      photoGroup = new THREE.Group();
      
      const names = ["GesturePilot", "VisionTracker", "SmartLock", "HydroGrow", "SoundCore"];
      const cardCount = names.length;

      for (let i = 0; i < cardCount; i++) {
        const geometry = new THREE.PlaneGeometry(24, 30);
        
        // Generate gorgeous Polaroid-style canvases
        const texture = createPolaroidTexture(names[i]);
        
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.95
        });

        const mesh = new THREE.Mesh(geometry, material);

        // Position photo cards floating around the tree in a wide orbit
        const angle = (i / cardCount) * Math.PI * 2;
        const radius = 80;
        const height = (i - cardCount/2) * 25; // Stacked vertically

        mesh.position.set(radius * Math.cos(angle), height, radius * Math.sin(angle));
        
        // Rotate meshes slightly to face outwards
        mesh.rotation.y = -angle + Math.PI / 2;
        mesh.rotation.z = (Math.random() - 0.5) * 0.15; // Natural casual rotation tilt

        // Save custom properties for smooth LERP transitions
        mesh.userData = {
          defaultPos: mesh.position.clone(),
          defaultRot: mesh.rotation.clone(),
          orbitAngle: angle,
          orbitRadius: radius,
          orbitHeight: height,
          index: i
        };

        photoGroup.add(mesh);
        photoCards.push(mesh);
      }

      scene.add(photoGroup);
    }

    // ──────────────────────── 状态机过渡核心 ────────────────────────
    function updateInterpolations() {
      // 1. Update Transition Progress
      // If we are folded, t decays to 0. If scattered, t grows to 1.
      const targetProg = (xmasState === 'folded') ? 0.0 : 1.0;
      stateTransitionProgress += transitionSpeed * (targetProg - stateTransitionProgress);

      // Smooth easing factor
      const easeVal = stateTransitionProgress; // Simple linear is fine for buffer lerp

      // 2. Interpolate particles positions in buffer geometry
      const posAttr = particleSystem.geometry.attributes.position;
      const pos = posAttr.array;

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;

        // Folded (Tree) coords
        const xF = positionsFolded[i3];
        const yF = positionsFolded[i3 + 1];
        const zF = positionsFolded[i3 + 2];

        // Scattered (Nebula) coords
        const xS = positionsScattered[i3];
        const yS = positionsScattered[i3 + 1];
        const zS = positionsScattered[i3 + 2];

        // Dynamic coordinate blending (LERP)
        pos[i3] = xF + easeVal * (xS - xF);
        pos[i3 + 1] = yF + easeVal * (yS - yF);
        pos[i3 + 2] = zF + easeVal * (zS - zF);

        // Add subtle cosmic breeze (swirling waves) to scattered nebula particles
        if (xmasState === 'scattered') {
          const pAngle = (Date.now() / 1500) + i * 0.01;
          pos[i3] += Math.sin(pAngle) * 0.2;
          pos[i3 + 2] += Math.cos(pAngle) * 0.2;
        }
      }
      posAttr.needsUpdate = true;

      // 3. Zoom / Drag Polaroid cards transition logic
      photoCards.forEach(card => {
        if (xmasState === 'zoomed' && activeZoomedPhoto === card) {
          // Bring selected card straight to camera view
          const zoomDistance = 60; // Distance in front of camera
          const targetPos = new THREE.Vector3(0, 0, zoomDistance);
          
          // Smoothly fly towards camera
          card.position.lerp(targetPos, 0.12);
          // Face the camera directly
          card.rotation.set(0, 0, 0);
        } else if (xmasState === 'scattered') {
          // Scattered mode: disperse photo cards outward as well
          const angle = card.userData.orbitAngle;
          const scatteredRadius = 140; // Expand radius
          const targetPos = new THREE.Vector3(
            scatteredRadius * Math.cos(angle),
            card.userData.orbitHeight * 1.5,
            scatteredRadius * Math.sin(angle)
          );
          card.position.lerp(targetPos, 0.08);
          card.rotation.set(0, -angle + Math.PI / 2, 0);
        } else {
          // Folded tree mode: return to natural default orbiting postures
          card.position.lerp(card.userData.defaultPos, 0.08);
          card.rotation.lerp(card.userData.defaultRot, 0.08);
        }
      });
    }

    // ──────────────────────── 3D 动画更新环 ────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Slowly rotate the entire particle system and orbits over time
      if (xmasState === 'folded') {
        particleSystem.rotation.y += 0.008; // Swirling tree
        starMesh.rotation.y += 0.015;
        starMesh.rotation.z += 0.005;
        
        // Move photo card orbits slowly
        photoCards.forEach(card => {
          card.userData.orbitAngle += 0.004; // Spin cards orbit
          card.userData.defaultPos.set(
            card.userData.orbitRadius * Math.cos(card.userData.orbitAngle),
            card.userData.orbitHeight,
            card.userData.orbitRadius * Math.sin(card.userData.orbitAngle)
          );
          if (xmasState !== 'zoomed') {
            card.rotation.y = -card.userData.orbitAngle + Math.PI / 2;
          }
        });
      } else if (xmasState === 'scattered') {
        particleSystem.rotation.y += 0.002; // slow drift nebula
        starMesh.rotation.y += 0.003;
      }

      // 60FPS interpolators
      updateInterpolations();

      // Smooth camera orbit movements (mapped to cursor or hand rotation)
      currentRotationX += 0.1 * (targetRotationX - currentRotationX);
      currentRotationY += 0.1 * (targetRotationY - currentRotationY);

      // Rotate camera rig around target
      camera.position.x = 240 * Math.sin(currentRotationX) * Math.cos(currentRotationY);
      camera.position.z = 240 * Math.cos(currentRotationX) * Math.cos(currentRotationY);
      camera.position.y = 120 * Math.sin(currentRotationY);
      camera.lookAt(0, 10, 0);

      renderer.render(scene, camera);
    }

    // Window size adapter
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ──────────────────────── 切换动作状态 ────────────────────────
    function switchState(newState) {
      if (xmasState === newState) return;
      
      xmasState = newState;
      
      // Update UI texts
      statusDot.className = "pulse-dot green";
      
      if (newState === 'folded') {
        gestureStateText.textContent = "合拢态 / CHRISTMAS TREE";
        activeZoomedPhoto = null;
      } else if (newState === 'scattered') {
        gestureStateText.textContent = "散开态 / PARTICLE COSMOS";
        activeZoomedPhoto = null;
      } else if (newState === 'zoomed') {
        gestureStateText.textContent = "拍立得放大态 / PHOTO DETAIL";
        // Pick random card to zoom into if none selected
        if (!activeZoomedPhoto) {
          activeZoomedPhoto = photoCards[Math.floor(Math.random() * photoCards.length)];
        }
      }
    }


    // ──────────────────────── 鼠标交互模拟模式 ────────────────────────
    let isMouseDown = false;
    let prevMouseX = 0, prevMouseY = 0;

    container.addEventListener('mousedown', (e) => {
      if (isCameraActive) return;
      isMouseDown = true;
      prevMouseX = e.clientX;
      prevMouseY = e.clientY;
      switchState('folded'); // Fist emulation
    });

    container.addEventListener('mouseup', () => {
      if (isCameraActive) return;
      isMouseDown = false;
      switchState('scattered'); // Open palm emulation
    });

    container.addEventListener('mousemove', (e) => {
      if (isCameraActive) return;
      
      if (isMouseDown) {
        // Drag to rotate camera angles
        const deltaX = e.clientX - prevMouseX;
        const deltaY = e.clientY - prevMouseY;
        prevMouseX = e.clientX;
        prevMouseY = e.clientY;

        targetRotationX -= deltaX * 0.007;
        targetRotationY += deltaY * 0.007;
        targetRotationY = Math.max(-Math.PI/4, Math.min(Math.PI/4, targetRotationY)); // lock clamp
      }
    });

    // Double click to trigger photo zoom in mouse mode
    container.addEventListener('dblclick', () => {
      if (isCameraActive) return;
      if (xmasState !== 'zoomed') {
        activeZoomedPhoto = photoCards[Math.floor(Math.random() * photoCards.length)];
        switchState('zoomed');
      } else {
        switchState('scattered');
      }
    });


    // ──────────────────────── AI 视觉手势引擎 (MediaPipe) ────────────────────────
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0, // High performance speed boost
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      if (!isCameraActive) return;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        rawLandmarks = landmarks;

        const wrist = landmarks[0];
        const indexBase = landmarks[5];
        const indexTip = landmarks[8];
        const thumbTip = landmarks[4];

        // 1. Gesture Roll/Yaw (Hand rotation maps to 3D scene camera rotation)
        const dx = indexBase.x - wrist.x;
        const dy = indexBase.y - wrist.y;
        const rollAngle = Math.atan2(dy, dx);
        
        // Smooth rotation angle
        smoothHandRoll += 0.15 * (rollAngle - smoothHandRoll);
        targetRotationX = (smoothHandRoll + Math.PI/2) * 1.5; // Yaw orbit
        
        // Hand height maps to vertical pitch orbit
        targetRotationY = (0.5 - indexBase.y) * Math.PI * 0.6;

        // 2. State Detection via finger spacing
        // Measure index tip to thumb tip distance (for Pinch zoom)
        const pDistX = indexTip.x - thumbTip.x;
        const pDistY = indexTip.y - thumbTip.y;
        const pinchDistance = Math.sqrt(pDistX*pDistX + pDistY*pDistY);

        // Measure general fist vs palm (average distance of tips to wrist)
        const tips = [8, 12, 16, 20];
        let averageWristDist = 0;
        tips.forEach(t => {
          const l = landmarks[t];
          const tx = l.x - wrist.x;
          const ty = l.y - wrist.y;
          averageWristDist += Math.sqrt(tx*tx + ty*ty);
        });
        averageWristDist /= 4;

        // Normalize wrist to index base scale to guard against z-depth
        const handScale = Math.sqrt(dx*dx + dy*dy);

        // State machine classification
        if (pinchDistance < (handScale * 0.45)) {
          // Pinch Zoom Trigger
          if (xmasState !== 'zoomed') {
            switchState('zoomed');
          }
        } else if (averageWristDist < (handScale * 1.35)) {
          // Fist Grab -> Fold xmas tree
          switchState('folded');
        } else {
          // Open hand -> Scattered starlight nebula
          switchState('scattered');
        }
      }
    });

    function requestCameraConsent() {
      return window.confirm(
        "摄像头使用说明

" +
        "本页面的 AI 手势功能会在您点击确认后调用本机摄像头，仅用于浏览器本地实时识别手势。
" +
        "视频画面不会上传服务器、不会保存，也不会用于其他用途。您可以随时关闭摄像头并返回鼠标模式。

" +
        "是否同意开启摄像头？"
      );
    }

    async function startCamera() {
      if (!window.isSecureContext && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        alert("浏览器要求摄像头功能必须在 HTTPS 安全连接下使用。请通过 HTTPS 访问本站，或继续使用鼠标模式。");
        return;
      }
      if (!requestCameraConsent()) {
        gestureStateText.textContent = "鼠标模式 / ACTIVE";
        return;
      }
      gestureStateText.textContent = "INITIALIZING CAM...";
      statusDot.className = "pulse-dot";
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240, frameRate: { ideal: 30 } }
        });
        
        webcamVideo.srcObject = stream;
        webcamOverlay.style.display = 'block';
        
        cameraInstance = new Camera(webcamVideo, {
          onFrame: async () => {
            if (isCameraActive) {
              await hands.send({ image: webcamVideo });
            }
          },
          width: 320,
          height: 240
        });

        await cameraInstance.start();
        
        isCameraActive = true;
        gestureStateText.textContent = "AI 视觉开启 / ACTIVE";
        btnToggleCamera.className = "btn-camera-trigger";
        btnToggleCamera.innerHTML = `<span>切换为鼠标模式</span>`;
      } catch (err) {
        console.error("Camera activation failed:", err);
        alert("无法启动您的摄像头设备，已为您自动进入极速鼠标模拟演示！");
        stopCamera();
      }
    }

    function stopCamera() {
      isCameraActive = false;
      if (cameraInstance) {
        cameraInstance.stop();
        cameraInstance = null;
      }
      if (webcamVideo.srcObject) {
        webcamVideo.srcObject.getTracks().forEach(t => t.stop());
        webcamVideo.srcObject = null;
      }
      webcamOverlay.style.display = 'none';
      gestureStateText.textContent = "鼠标模式 / ACTIVE";
      btnToggleCamera.className = "btn-camera-trigger";
      btnToggleCamera.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> <span>启动 AI 摄像头</span>`;
    }

    btnToggleCamera.addEventListener('click', () => {
      if (isCameraActive) {
        stopCamera();
      } else {
        startCamera();
      }
    });

    // Run Engine
    init3D();
    animate();

  </script>
