<!DOCTYPE html>

<body>

  <div class="cursor-glow"></div>

  <!-- ==================== 导航栏 ==================== -->

    <div class="container">
      <a href="index.html" class="nav-brand">

        <a href="index.html#products">核心产品</a>
        <a href="index.html#all-projects">全部项目</a>
        <a href="index.html#contact" class="nav-contact-btn">联系我</a>
      </div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ==================== 页面 Hero ==================== -->
  <section class="page-hero">
    <div class="hero-bg">
      <div class="hero-glow hero-glow--1"></div>
      <div class="hero-glow hero-glow--2"></div>
      <div class="hero-grid-lines"></div>
    </div>
    <div class="container">
      <div class="page-hero-breadcrumb">
        <a href="index.html">首页</a>
        <span class="sep">/</span>
        <a href="index.html#all-projects">全部项目</a>
        <span class="sep">/</span>
        <span id="breadcrumbName">加载中...</span>
      </div>
      <h1 class="page-hero-title" id="detailTitle">
        <span class="gradient-text" id="detailCategory"></span><br/><span id="detailName">加载中...</span>
      </h1>
      <p class="page-hero-subtitle" id="detailDesc"></p>
      <div class="page-hero-tags" id="detailTags"></div>
    </div>
  </section>

  <!-- ==================== 产品图片画廊 ==================== -->
  <section class="product-gallery" id="gallerySection" style="display:none;">
    <div class="container">
      <div class="gallery-grid reveal" id="galleryGrid"></div>
    </div>
  </section>

  <!-- ==================== 技术参数 ==================== -->
  <section class="product-specs" id="specsSection" style="display:none;">
    <div class="container">
      <div class="reveal" style="text-align:center;">
        <span class="section-label">Technical Specs</span>
        <h2 class="section-title">技术<span class="gradient-text">参数</span></h2>
      </div>
      <table class="product-specs-table reveal" id="specsTable"></table>
    </div>
  </section>

  <!-- ==================== CTA ==================== -->
  <section class="product-cta">
    <div class="container reveal">
      <h2 class="section-title">查看<span class="gradient-text">更多产品</span></h2>
      <p class="section-desc">探索更多嵌入式智能硬件项目。</p>
      <a href="index.html#products" class="btn btn-primary">核心产品</a>
      <a href="index.html#all-projects" class="btn btn-outline">全部项目</a>
    </div>
  </section>

  <!-- ==================== 页脚 ==================== -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-top">
        <div>
          <div class="footer-brand">
            <span class="nav-brand-icon"></span>
            Smart Hardware Lab
          </div>
          <p class="footer-desc">嵌入式智能硬件独立开发者个人作品集。</p>
        </div>
        <div class="footer-links-group">
          <h4>快速导航</h4>
          <a href="index.html">首页</a>
          <a href="index.html#products">核心产品</a>
          <a href="index.html#all-projects">全部项目</a>
        </div>
        <div class="footer-links-group">
          <h4>联系方式</h4>
          <a href="mailto:13393961819@163.com">邮箱: 13393961819@163.com</a>
          <a href="tel:13393961819">电话: 13393961819</a>
        </div>
      </div>
      <div class="footer-bottom">
        <span>&copy; 2026 Smart Hardware Lab · 个人作品集</span>
        <span>用代码与电路构建智能硬件原型</span>
        <span><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;">豫ICP备2026025181号-1</a></span>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      if (!productId) {
        document.getElementById('detailName').textContent = '未找到产品';
        return;
      }

      fetch('api.php?action=list')
        .then(r => r.json())
        .then(data => {
          const products = data.products || [];
          const p = products.find(item => item.id === productId);
          if (!p) {
            document.getElementById('detailName').textContent = '产品不存在';
            return;
          }

          document.title = p.name + ' | Smart Hardware Lab';
          document.getElementById('breadcrumbName').textContent = p.name;
          document.getElementById('detailName').textContent = p.name;
          document.getElementById('detailCategory').textContent = p.category || '';
          document.getElementById('detailDesc').textContent = p.subtitle || p.description || '';

          // 标签
          const tagsEl = document.getElementById('detailTags');
          (p.tags || []).forEach(t => {
            const span = document.createElement('span');
            span.className = 'page-hero-tag';
            span.textContent = t;
            tagsEl.appendChild(span);
          });

          // 图片画廊
          if (p.images && p.images.length > 0) {
            document.getElementById('gallerySection').style.display = '';
            const grid = document.getElementById('galleryGrid');

            // 主图区域
            const mainWrap = document.createElement('div');
            mainWrap.className = 'gallery-main';
            const mainImg = document.createElement('img');
            mainImg.src = p.images[0];
            mainImg.alt = p.name;
            mainImg.id = 'galleryMainImg';
            mainWrap.appendChild(mainImg);
            grid.appendChild(mainWrap);

            // 缩略图列表
            if (p.images.length > 1) {
              const thumbRow = document.createElement('div');
              thumbRow.className = 'gallery-thumbs';
              p.images.forEach((src, i) => {
                const thumb = document.createElement('div');
                thumb.className = 'gallery-thumb' + (i === 0 ? ' active' : '');
                thumb.innerHTML = `<img src="${src}" alt="${p.name}" />`;
                thumb.addEventListener('click', () => {
                  mainImg.src = src;
                  thumbRow.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
                  thumb.classList.add('active');
                });
                thumbRow.appendChild(thumb);
              });
              grid.appendChild(thumbRow);
            }
          }

          // 技术参数
          if (p.specs && p.specs.trim()) {
            document.getElementById('specsSection').style.display = '';
            const table = document.getElementById('specsTable');
            p.specs.split('\n').forEach(line => {
              const parts = line.split('|');
              if (parts.length >= 2) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${parts[0].trim()}</td><td>${parts[1].trim()}</td>`;
                table.appendChild(tr);
              }
            });
          }
        })
        .catch(() => {
          document.getElementById('detailName').textContent = '加载失败';
        });
    })();
  </script>
</body>
</html>
