  <!-- ==================== 100% 运行期错误诊断监听器（黑屏故障捕获） ==================== -->
  <div id="runtime-error-overlay" style="position: fixed; top: 10px; left: 10px; right: 10px; z-index: 999999; background: rgba(185, 28, 28, 0.95); border: 2px solid #ef4444; color: #fef2f2; padding: 18px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto;">
    <h3 style="margin: 0 0 10px 0; color: #fecaca; font-size: 16px; border-bottom: 1px solid rgba(254, 202, 202, 0.3); padding-bottom: 8px;">⚠️ 浏览器检测到运行期 JavaScript 错误：</h3>
    <div id="error-message-content" style="line-height: 1.6; white-space: pre-wrap; word-break: break-all;"></div>
    <p style="margin: 12px 0 0 0; font-size: 11px; color: #fca5a5;">请将上述错误信息发给我，我将为您一秒定位并修复！</p>
  </div>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const overlay = document.getElementById('runtime-error-overlay');
      const content = document.getElementById('error-message-content');
      if (overlay && content) {
        overlay.style.display = 'block';
        content.innerHTML = `<b>错误内容:</b> ${message}\n<b>源文件:</b> ${source}\n<b>出错行号:</b> ${lineno} 列 ${colno}\n<b>堆栈详情:</b> ${error ? error.stack : '无'}`;
      }
      return false; // Let the browser handle standard logging too
    };

    // Global catch for async/Promise errors (e.g. webcam permission, MediaPipe loader failures)
    window.onunhandledrejection = function(event) {
      const overlay = document.getElementById('runtime-error-overlay');
      const content = document.getElementById('error-message-content');
      if (overlay && content) {
        overlay.style.display = 'block';
        const reason = event.reason;
        content.innerHTML = `<b>⚠️ 异步 Promise 报错捕获:</b>\n<b>内容:</b> ${reason ? (reason.message || reason) : '未知的 Promise 拒绝'}\n<b>出错堆栈:</b> ${reason && reason.stack ? reason.stack : '无'}`;
      }
    };
  </script>

  <!-- Main Three.js Global Script Logic -->
  <script>
    // ──────────────────────── 3D 核心配置参数 ────────────────────────
    const particleCount = 18000; // Perfect visual density and silky 60FPS on 16-inch screens!
    const canvas = document.getElementById('webgl-canvas');
    let scene, camera, renderer, composer;
    let particleSystem, bgStarField;
    let time = 0; // Universal clock for fluid flow waves and hue drifting!
    let particleMaterial, nodeMat, lineMat, gridHelper; // Global references for direct HSL color modulation
    
    // ─── 物理引擎缓冲区 (Velocities & Gravity Attractor targets) ───
    let velocities; // Float32Array for real-time Newtonian kinematics
    let gestureState = 'DEMO'; // 'DEMO' | 'SPREAD' | 'FIST' | 'POINT' | 'PINCH'
    let lastGestureState = 'DEMO'; // Tracker for snappy transition shockwaves!
    
    // Projected 3D hand tracking joint attractors for magnetic magnetic pull
    const indexAttractor = new THREE.Vector3(0, 0, 0);
    const thumbAttractor = new THREE.Vector3(0, 0, 0);
    const smoothIndexAttractor = new THREE.Vector3(0, 0, 0);
    const smoothThumbAttractor = new THREE.Vector3(0, 0, 0);

    // ─── 3D Holographic Morph Targets (三维全息形变目标点数据) ───
    const positionsCity = [];   // Futuristic digital skyscraper cityscape grid (80,000 points)
    const positionsTorus = [];  // Gyroscopic double toroidal ring (80,000 points)
    let scannerRingsGroup;

    // Smooth LERP dynamic colors for seamless gesture-state color morphing (梦幻粉红渐变色相)
    const currentSphereColor = new THREE.Color('#ec4899');
    const targetSphereColor = new THREE.Color('#ec4899');
    const currentTesseractColor = new THREE.Color('#ec4899');
    const targetTesseractColor = new THREE.Color('#ec4899');
    
    // Smooth interpolator buffers (Exponentional Moving Average - EMA)
    const smoothInput = {
      spread: 1.0,   // [0, 1] fist -> open
      twist: 0.0,    // tilt angle of hand
      posX: 0.0,     // normal [-1, 1]
      posY: 0.0      // normal [-1, 1]
    };
    
    // Target inputs from either AI or Auto-Demo Wave
    const targetInput = {
      spread: 1.0,
      twist: 0.0,
      posX: 0.0,
      posY: 0.0,
      active: false // Flag true if hand detected
    };

    const LERP_FACTOR = 0.08; // High fidelity smoothing factor

    // Geometry position arrays
    let positionsGalaxy = [];
    let particleHues = [];
    let particleSizes = [];
    let initialDistances = []; // To calculate perfect expansion

    // ──────────────────────── 径向渐变粒子点精灵纹理 ────────────────────────
    function createRadialGlowTexture() {
      const pCanvas = document.createElement('canvas');
      pCanvas.width = 128;
      pCanvas.height = 128;
      const pCtx = pCanvas.getContext('2d');

      const grad = pCtx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, 'rgba(255, 255, 255, 1.0)');     // Pure white-hot core
      grad.addColorStop(0.15, 'rgba(244, 114, 182, 1.0)');   // Glowing neon sakura pink
      grad.addColorStop(0.45, 'rgba(219, 39, 119, 0.72)');   // Dreamy hot rose magenta mid-layer
      grad.addColorStop(0.78, 'rgba(107, 33, 168, 0.35)');   // Ethereal amethyst purple edge glow
      grad.addColorStop(1, 'rgba(0, 0, 0, 0)');              // Transparent fade

      pCtx.fillStyle = grad;
      pCtx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(pCanvas);
    }

    // ──────────────────────── 赛博全息 AI 脑突触节点纹理 ────────────────────────
    function createDigitalNodeTexture() {
      const pCanvas = document.createElement('canvas');
      pCanvas.width = 128;
      pCanvas.height = 128;
      const pCtx = pCanvas.getContext('2d');

      // 1. Outer cyber tracking ring (Neon circle)
      pCtx.strokeStyle = 'rgba(0, 243, 255, 0.75)';
      pCtx.lineWidth = 4.0;
      pCtx.beginPath();
      pCtx.arc(64, 64, 45, 0, Math.PI * 2);
      pCtx.stroke();

      // 2. Center high-voltage lightning spark core
      const grad = pCtx.createRadialGradient(64, 64, 0, 64, 64, 25);
      grad.addColorStop(0, 'rgba(255, 255, 255, 1.0)');      // Pure white hot point
      grad.addColorStop(0.35, 'rgba(0, 243, 255, 0.95)');   // High neon cyan
      grad.addColorStop(1, 'rgba(0, 243, 255, 0)');          // Smooth bleed fade
      pCtx.fillStyle = grad;
      pCtx.beginPath();
      pCtx.arc(64, 64, 25, 0, Math.PI * 2);
      pCtx.fill();

      // 3. Crosshair hairline ticks (horizontal and vertical scanning tick marks)
      pCtx.strokeStyle = 'rgba(0, 243, 255, 0.45)';
      pCtx.lineWidth = 2.0;
      pCtx.beginPath();
      // top tick
      pCtx.moveTo(64, 5); pCtx.lineTo(64, 15);
      // bottom tick
      pCtx.moveTo(64, 113); pCtx.lineTo(64, 123);
      // left tick
      pCtx.moveTo(5, 64); pCtx.lineTo(15, 64);
      // right tick
      pCtx.moveTo(113, 64); pCtx.lineTo(123, 64);
      pCtx.stroke();

      return new THREE.CanvasTexture(pCanvas);
    }

    // ──────────────────────── 构建高密度复合粒子圆球 ────────────────────────
    function buildGalaxy() {
      const geometry = new THREE.BufferGeometry();
      const posArray = new Float32Array(particleCount * 3);
      const colArray = new Float32Array(particleCount * 3);

      // Initialize physics engine velocities buffer to zero (80,000 * 3 floats)
      velocities = new Float32Array(particleCount * 3);

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        
        // Generate uniform spherical coordinates
        const u = Math.random();
        const v = Math.random();
        const theta = u * 2.0 * Math.PI;
        const phi = Math.acos(2.0 * v - 1.0);

        // Power distribution for radial density: cluster tightly at center but spread outward
        let rad;
        const randSelector = Math.random();
        if (randSelector < 0.25) {
          // Inner core sphere (Super-dense cluster)
          rad = Math.pow(Math.random(), 1.5) * 15;
        } else if (randSelector < 0.75) {
          // Mid core shell
          rad = 15 + Math.pow(Math.random(), 1.2) * 30;
        } else {
          // Outer shell halo
          rad = 45 + Math.pow(Math.random(), 1.0) * 20;
        }

        // Vertical flat circular disk constellation (directly facing the screen on X-Y plane, extremely thin on Z-axis!)
        const x = rad * Math.cos(theta);
        const y = rad * Math.sin(theta);
        const z = (Math.random() - 0.5) * 1.2;

        // Store positions
        posArray[i3] = x;
        posArray[i3 + 1] = y;
        posArray[i3 + 2] = z;
        positionsGalaxy.push(x, y, z);
        initialDistances.push(rad);

        // Neon cyber glow colors (Strictly gorgeous Sakura-Rose pink and magenta, no blues!)
        const color = new THREE.Color();
        if (rad < 15) {
          // Hot golden-white core to neon electric pink
          color.lerpColors(new THREE.Color('#ffffff'), new THREE.Color('#ec4899'), Math.random() * 0.7);
        } else if (rad < 45) {
          // Shimmering sakura pink to bright hot fuchsia magenta
          color.lerpColors(new THREE.Color('#f472b6'), new THREE.Color('#db2777'), Math.random());
        } else {
          // Ethereal outer cosmic rose-pink to deep amethyst purple
          color.lerpColors(new THREE.Color('#ff007f'), new THREE.Color('#701a75'), Math.random());
        }

        colArray[i3] = color.r;
        colArray[i3 + 1] = color.g;
        colArray[i3 + 2] = color.b;

        // Custom size factor
        const pSize = Math.random() * 0.45 + 0.12;
        particleSizes.push(pSize);
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));

      particleMaterial = new THREE.PointsMaterial({
        size: 3.2, // Expanded size for stunning details on 16-inch laptop screen!
        map: createRadialGlowTexture(),
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        transparent: true,
        depthWrite: false,
        opacity: 0.95
      });

      particleSystem = new THREE.Points(geometry, particleMaterial);
      scene.add(particleSystem);

      // Pre-compute high-fidelity 3D Morph Targets (City & Torus structures)
      generateMorphTargets();
    }

    // ──────────────────────── 生成全息形变目标点数据 (City & Torus) ────────────────────────
    function generateMorphTargets() {
      // 1. Generate Torus (Pinch Loop Accelerator) targets
      for (let i = 0; i < particleCount; i++) {
        // Major radius = 48, minor radius = 11 + random thickness
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 2;
        const R = 48;
        const r = 9 + Math.pow(Math.random(), 1.2) * 11;
        
        const tx = (R + r * Math.cos(phi)) * Math.cos(theta);
        const ty = r * Math.sin(phi);
        const tz = (R + r * Math.cos(phi)) * Math.sin(theta);

        positionsTorus.push(tx, ty, tz);
      }

      // 2. Generate Cyber City grid targets (36 holographic skyscrapers on 6x6 grid)
      const gridCount = 6;
      const buildingCount = gridCount * gridCount;
      const particlesPerBuilding = Math.floor(particleCount / buildingCount); // ~2222 per building
      
      let pIdx = 0;
      for (let bx = 0; bx < gridCount; bx++) {
        for (let bz = 0; bz < gridCount; bz++) {
          // Grid spacing
          const gridSpacing = 42;
          const centerX = (bx - (gridCount - 1) / 2) * gridSpacing;
          const centerZ = (bz - (gridCount - 1) / 2) * gridSpacing;

          // Building footprint bounds
          const bWidth = 14 + Math.random() * 8;
          const bDepth = 14 + Math.random() * 8;
          
          // Core buildings are towering, outer ones are shorter
          const dx = bx - 2.5;
          const dz = bz - 2.5;
          const distFromCenter = Math.sqrt(dx*dx + dz*dz);
          const bHeight = 40 + Math.random() * 65 + Math.max(0, 4.0 - distFromCenter) * 16;

          for (let p = 0; p < particlesPerBuilding; p++) {
            let px, py, pz;

            // 65% particles are mapped as glowing vertical outer wall matrix (windows / wireframes)
            if (Math.random() < 0.65) {
              const face = Math.floor(Math.random() * 5);
              const u = Math.random() - 0.5;
              const v = Math.random() - 0.5;

              if (face === 0) { // Front face wall
                px = centerX + u * bWidth;
                py = Math.random() * bHeight;
                pz = centerZ + 0.5 * bDepth;
              } else if (face === 1) { // Back face wall
                px = centerX + u * bWidth;
                py = Math.random() * bHeight;
                pz = centerZ - 0.5 * bDepth;
              } else if (face === 2) { // Left face wall
                px = centerX - 0.5 * bWidth;
                py = Math.random() * bHeight;
                pz = centerZ + v * bDepth;
              } else if (face === 3) { // Right face wall
                px = centerX + 0.5 * bWidth;
                py = Math.random() * bHeight;
                pz = centerZ + v * bDepth;
              } else { // Flat roof
                px = centerX + u * bWidth;
                py = bHeight;
                pz = centerZ + v * bDepth;
              }
              py -= 25; // Sit building bases perfectly on spatial grid floor
            } else {
              // 35% interior volume holographic glow fog
              px = centerX + (Math.random() - 0.5) * bWidth;
              py = Math.random() * bHeight - 25;
              pz = centerZ + (Math.random() - 0.5) * bDepth;
            }

            positionsCity.push(px, py, pz);
            pIdx++;
          }
        }
      }

      // Safeguard filler
      while (pIdx < particleCount) {
        positionsCity.push(
          (Math.random() - 0.5) * 180,
          Math.random() * 80 - 25,
          (Math.random() - 0.5) * 180
        );
        pIdx++;
      }
    }

    // ──────────────────────── 背景宇宙背景星 ────────────────────────
    function buildBackgroundStars() {
      const bgGeometry = new THREE.BufferGeometry();
      const count = 1800;
      const array = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        // Spherical distribution at massive distance
        const radius = 350 + Math.random() * 150;
        const u = Math.random();
        const v = Math.random();
        const theta = u * 2.0 * Math.PI;
        const phi = Math.acos(2.0 * v - 1.0);

        array[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        array[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        array[i * 3 + 2] = radius * Math.cos(phi);
      }

      bgGeometry.setAttribute('position', new THREE.BufferAttribute(array, 3));
      const bgMaterial = new THREE.PointsMaterial({
        size: 0.45,
        color: 0x475569, // Soft slate blue (not distracting)
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending
      });

      bgStarField = new THREE.Points(bgGeometry, bgMaterial);
      scene.add(bgStarField);
    }

    // ──────────────────────── 构建全息 AI 扫描环线 ────────────────────────
    function buildCyberScannerRings() {
      scannerRingsGroup = new THREE.Group();

      function createScannerRing(radius, segments, color) {
        const geom = new THREE.BufferGeometry();
        const points = [];
        for (let i = 0; i <= segments; i++) {
          const theta = (i / segments) * Math.PI * 2;
          points.push(radius * Math.cos(theta), 0, radius * Math.sin(theta));
        }
        geom.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
        
        const mat = new THREE.LineBasicMaterial({
          color: color,
          transparent: true,
          opacity: 0.78, // Increased opacity for massive visibility
          blending: THREE.AdditiveBlending,
          depthWrite: false
        });
        return new THREE.Line(geom, mat);
      }

      // Ring 1: Cyber cyan, horizontal core scan
      const ring1 = createScannerRing(35, 64, 0x00f3ff);
      ring1.rotation.x = Math.PI * 0.12;
      scannerRingsGroup.add(ring1);

      // Ring 2: Neon Pink/Magenta, tilted mid orbit
      const ring2 = createScannerRing(72, 64, 0xec4899);
      ring2.rotation.x = -Math.PI * 0.18;
      ring2.rotation.z = Math.PI * 0.25;
      scannerRingsGroup.add(ring2);

      // Ring 3: Matrix Deep Purple, wide boundary
      const ring3 = createScannerRing(115, 80, 0x8b5cf6);
      ring3.rotation.z = -Math.PI * 0.3;
      scannerRingsGroup.add(ring3);

      scene.add(scannerRingsGroup);

      // Add a Holographic 3D Spatial Grid Floor (The ultimate cybernetic spatial reference!)
      gridHelper = new THREE.GridHelper(260, 26, 0xec4899, 0x4a044e);
      gridHelper.position.y = -25; // Floating slightly below the galaxy disk
      gridHelper.material.transparent = true;
      gridHelper.material.opacity = 0.18;
      gridHelper.material.blending = THREE.AdditiveBlending;
      gridHelper.material.depthWrite = false;
      scene.add(gridHelper);
    }

    // ──────────────────────── 初始化 Three.js 引擎 ────────────────────────
    function initEngine() {
      // 1. Scene
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x020205, 0.0035);

      // 2. Camera
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.set(0, 75, 175);

      // 3. Renderer
      renderer = new THREE.WebGLRenderer({
        canvas: canvas,
        antialias: true,
        powerPreference: "high-performance"
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap at 2 for performance
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;

      // 4. Populate Objects (Pure direct rendering, bypass composer to ensure 100% device compatibility)
      buildGalaxy();
      buildBackgroundStars();
      buildCyberScannerRings();

      // Ambient glow helper lights (Modified to beautiful electric dreamy hot pink)
      const coreLight = new THREE.PointLight(0xec4899, 4.5, 150);
      coreLight.position.set(0, 0, 0);
      scene.add(coreLight);

      window.addEventListener('resize', onResize);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ──────────────────────── 主渲染循环 (60FPS) ────────────────────────
    function renderLoop() {
      requestAnimationFrame(renderLoop);

      // 0. Increment global clock for silky-smooth fluid wave calculations and HSL hue shifts
      time += 0.012;

      // 1. Execute EMA Smooth LERP for general camera orbits
      smoothInput.spread += LERP_FACTOR * (targetInput.spread - smoothInput.spread);
      smoothInput.twist += LERP_FACTOR * (targetInput.twist - smoothInput.twist);
      smoothInput.posX += LERP_FACTOR * (targetInput.posX - smoothInput.posX);
      smoothInput.posY += LERP_FACTOR * (targetInput.posY - smoothInput.posY);

      // 1.5. Silky LERP of projected 3D joint attractors for magnetism physics
      smoothIndexAttractor.lerp(indexAttractor, 0.14);
      smoothThumbAttractor.lerp(thumbAttractor, 0.14);

      // 2. Dynamic status telemetry feedback
      document.getElementById('spreadPercent').textContent = `${Math.round(smoothInput.spread * 100)}%`;
      document.getElementById('spreadBarFill').style.width = `${smoothInput.spread * 100}%`;

      // 3. Update core sphere particles based on input parameters (Gravity collapse + Detonation + Torus Warp)
      const posAttr = particleSystem.geometry.attributes.position;
      const pos = posAttr.array;

      // 3.1. Hand Gesture State Transition Shockwave Engine!
      if (gestureState !== lastGestureState) {
        lastGestureState = gestureState;
        
        // Push all particles outward dynamically on transition!
        const pushForce = (gestureState === 'FIST') ? 2.5 : 8.5; // smaller kick for fist collapse so it feels sucked in afterward
        for (let i = 0; i < particleCount; i++) {
          const i3 = i * 3;
          const px = pos[i3];
          const py = pos[i3 + 1];
          const pz = pos[i3 + 2];
          const dist = Math.sqrt(px*px + py*py + pz*pz) || 1;
          
          velocities[i3] += (px / dist) * pushForce;
          velocities[i3 + 1] += (py / dist) * pushForce;
          velocities[i3 + 2] += (pz / dist) * pushForce;
        }
      }

      const currentScale = 0.15 + smoothInput.spread * 4.05; 
      const rotationSpeed = (gestureState === 'SPREAD' || gestureState === 'DEMO') ? 0.005 : (0.0015 + (1.0 - smoothInput.spread) * 0.12);

      // Surface wave frequencies for idle SPREAD mode
      const waveFreq = 0.04;
      const waveAmp = 3.5 * (0.4 + smoothInput.spread * 1.4);

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        
        let px = pos[i3];
        let py = pos[i3 + 1];
        let pz = pos[i3 + 2];

        let vx = velocities[i3];
        let vy = velocities[i3 + 1];
        let vz = velocities[i3 + 2];

        // Base coordinate values of initial spherical shell
        const xB = positionsGalaxy[i3];
        const yB = positionsGalaxy[i3 + 1];
        const zB = positionsGalaxy[i3 + 2];

        let targetX, targetY, targetZ;
        let ax = 0;
        let ay = 0;
        let az = 0;

        if (gestureState === 'POINT') {
          // ☝️ HOLOGRAPHIC CYBER CITY SKYLINE MORPH
          targetX = positionsCity[i3];
          targetY = positionsCity[i3 + 1];
          targetZ = positionsCity[i3 + 2];
          
          // Single finger left-right sway: apply natural building shear tilting based on vertical height
          const heightFactor = Math.max(0, (targetY + 25) / 110); // Higher parts sway and tilt more!
          const swayShear = smoothInput.posX * 38 * heightFactor;
          targetX += swayShear;

          // Add elegant wind wavy ripple to skyscraper voxel vertices
          targetZ += Math.sin(targetY * 0.05 + time * 1.5) * 3.5;
        } 
        else if (gestureState === 'PINCH') {
          // 🤌 MÖBIUS TOROIDAL PLASMA ACCELERATOR LOOP
          targetX = positionsTorus[i3];
          targetY = positionsTorus[i3 + 1];
          targetZ = positionsTorus[i3 + 2];

          // Double finger left-right sway: tilt and angle the ring dynamically in 3D
          const tiltAngle = smoothInput.posX * Math.PI * 0.22; // rotate up to 40 degrees
          const cosT = Math.cos(tiltAngle);
          const sinT = Math.sin(tiltAngle);
          
          const rx = targetX;
          const rz = targetZ;
          targetX = rx * cosT - rz * sinT + smoothInput.posX * 40; // slant rotate + translate
          targetZ = rx * sinT + rz * cosT;
          targetY += smoothInput.posY * 22; // adjust altitude based on fingertip vertical pos
        } 
        else if (gestureState === 'FIST') {
          // ✊ CONSTANT GRAVITY COLLAPSE: Pulling all particles towards dense central core (stay collapsed!)
          const dx = -px;
          const dy = -py;
          const dz = -pz;
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
          const force = 18.0 / (dist * 0.015 + 1.0);
          ax = (dx / dist) * force;
          ay = (dy / dist) * force;
          az = (dz / dist) * force;

          // Swirl spiral rotation around Y-axis during collapse
          const swirlSpeed = 2.8;
          ax += (-pz / dist) * swirlSpeed;
          az += (px / dist) * swirlSpeed;
        } 
        else {
          // 🖐️ SPREAD (Open Hand / Idle): Spherical breathing planet core
          const breathScale = 1.0 + Math.sin(time * 2.2) * 0.15;
          targetX = xB * currentScale * breathScale;
          targetY = yB * currentScale * breathScale;
          targetZ = zB * currentScale * breathScale;

          // Full open hand waving left-right ("全手掌向左向右"):
          // Translate entire sphere and trigger flowing liquid wave ocean ripples!
          const swayOffset = smoothInput.posX * 38;
          const radiusFactor = initialDistances[i] / 65; // outer shell sways more
          targetX += swayOffset * Math.cos(radiusFactor * Math.PI * 0.5);
          targetY += Math.sin(xB * 0.02 + time * 2.2) * 7.5 * smoothInput.posX; // wave ripple
        }

        // Apply restoring spring pulling force towards morph target positions
        if (gestureState !== 'FIST') {
          const springK = (gestureState === 'POINT' || gestureState === 'PINCH') ? 0.24 : 0.16;
          ax += (targetX - px) * springK;
          ay += (targetY - py) * springK;
          az += (targetZ - pz) * springK;
        }

        // Apply twist transformation based on hand Roll Twist angle
        if (Math.abs(smoothInput.twist) > 0.01) {
          const distanceRatio = initialDistances[i] / 200;
          const twistAngle = smoothInput.twist * distanceRatio * 2.5;
          const cosT = Math.cos(twistAngle);
          const sinT = Math.sin(twistAngle);
          
          const rawX = px;
          const rawZ = pz;
          px = rawX * cosT - rawZ * sinT;
          pz = rawX * sinT + rawZ * cosT;
        }

        // Euler Integration: Update velocities
        vx += ax;
        vy += ay;
        vz += az;

        // Friction / Damping
        const damping = (gestureState === 'FIST' || gestureState === 'POINT' || gestureState === 'PINCH') ? 0.92 : 0.84;
        vx *= damping;
        vy *= damping;
        vz *= damping;

        // 🚀 A. SPEED LIMITER CONSTRAINT (Prevent numerical explosion)
        const speed = Math.sqrt(vx*vx + vy*vy + vz*vz) || 1;
        if (speed > 13.5) {
          vx = (vx / speed) * 13.5;
          vy = (vy / speed) * 13.5;
          vz = (vz / speed) * 13.5;
        }

        // Euler Integration: Update coordinates
        px += vx;
        py += vy;
        pz += vz;

        // 🪐 B. SPHERICAL CONTAINMENT CAGE (Prevent particles escaping into dark fog/camera far plane)
        const maxRadius = 230; // Within safe fog Exp2 density limits
        const distFromOrigin = Math.sqrt(px*px + py*py + pz*pz) || 1;
        if (distFromOrigin > maxRadius) {
          px = (px / distFromOrigin) * maxRadius;
          py = (py / distFromOrigin) * maxRadius;
          pz = (pz / distFromOrigin) * maxRadius;
          
          // Gently bounce particles back and kill outward momentum
          const dotVelocity = vx*px + vy*py + vz*pz;
          if (dotVelocity > 0) { // Moving outward
            vx = -vx * 0.25;
            vy = -vy * 0.25;
            vz = -vz * 0.25;
          }
        }

        pos[i3] = px;
        pos[i3 + 1] = py;
        pos[i3 + 2] = pz;

        velocities[i3] = vx;
        velocities[i3 + 1] = vy;
        velocities[i3 + 2] = vz;
      }
      posAttr.needsUpdate = true;

      // 3.6. Rotate and scale AI Holographic Scanner Rings
      if (scannerRingsGroup) {
        // Gyroscopic rotation
        scannerRingsGroup.rotation.y += 0.004;
        scannerRingsGroup.children[0].rotation.y += 0.012;
        scannerRingsGroup.children[1].rotation.z -= 0.008;
        scannerRingsGroup.children[2].rotation.x += 0.006;
        
        // Let the scanner ring group expand and contract with the gesture!
        scannerRingsGroup.scale.setScalar(0.45 + currentScale * 0.55);
      }

      // 3.8. Seamless Color LERP: morph particle colors based on gestureState for dreamy cyber aesthetics!
      if (gestureState === 'FIST') {
        // Hot raspberry rose-crimson detonation
        targetSphereColor.set('#ff007f');
      } else if (gestureState === 'POINT') {
        // Ethereal neon fuchsia/magenta (Futuristic Cyber City Skyline)
        targetSphereColor.set('#d946ef');
      } else if (gestureState === 'PINCH') {
        // Toroidal plasma loop (Dreamy coral fuchsia-pink)
        targetSphereColor.set('#f472b6');
      } else {
        // Default breathing sphere (Dreamy electric sakura-pink)
        targetSphereColor.set('#ec4899');
      }

      currentSphereColor.lerp(targetSphereColor, 0.08);

      if (particleMaterial) {
        particleMaterial.color.copy(currentSphereColor);
      }
      if (gridHelper) {
        gridHelper.material.color.copy(currentSphereColor);
      }

      // Scanner rings dynamic matching color tones
      if (scannerRingsGroup && scannerRingsGroup.children.length >= 3) {
        scannerRingsGroup.children[0].material.color.copy(currentSphereColor);
        scannerRingsGroup.children[1].material.color.copy(currentSphereColor);
        scannerRingsGroup.children[2].material.color.copy(currentSphereColor);
      }

      // 4. Background & Core Orbit Rotation (Dynamic Multi-Axis transition LERP)
      if (gestureState === 'SPREAD' || gestureState === 'DEMO') {
        particleSystem.rotation.z += rotationSpeed;
        particleSystem.rotation.y += (0.0 - particleSystem.rotation.y) * 0.12; // Smoothly LERP other angles to 0
        particleSystem.rotation.x += (0.0 - particleSystem.rotation.x) * 0.12;
      } else {
        particleSystem.rotation.y += rotationSpeed;
        particleSystem.rotation.z += (0.0 - particleSystem.rotation.z) * 0.12;
        particleSystem.rotation.x += (0.0 - particleSystem.rotation.x) * 0.12;
      }
      bgStarField.rotation.y += 0.0003; // extremely slow cosmic drift

      // 5. Camera orbiting mapped to palm normalized coordinates (Sphere Projection)
      const orbitX = smoothInput.posX * Math.PI * 0.35; // Yaw map [-60, 60] degrees
      const orbitY = smoothInput.posY * Math.PI * 0.18; // Pitch map [-30, 30] degrees

      // Smooth camera interpolation with Cinematic Dynamic Zoom (CDZ)!
      // Camera zooms deep in [110] when fist clenches, zooms far out [260] when hand opens!
      const baseDistance = 110 + smoothInput.spread * 150; 
      const targetCamX = baseDistance * Math.sin(orbitX) * Math.cos(orbitY);
      const targetCamZ = baseDistance * Math.cos(orbitX) * Math.cos(orbitY);
      const targetCamY = baseDistance * Math.sin(orbitY) + 30;

      camera.position.x += 0.06 * (targetCamX - camera.position.x);
      camera.position.y += 0.06 * (targetCamY - camera.position.y);
      camera.position.z += 0.06 * (targetCamZ - camera.position.z);
      camera.lookAt(0, 0, 0);

      // 6. Output Frame
      renderer.render(scene, camera);
    }

    // ──────────────────────── 智能自转/呼吸模态 (Auto Demo) ────────────────────────
    let demoWave = 0;

    function executeAutoDemo() {
      if (targetInput.active) return; // Ignore if hand active

      demoWave += 0.02;
      
      // Keep gestureState strictly stabilized as SPREAD (the perfect dreamy blue breathing sphere!)
      gestureState = 'SPREAD';

      // SPREAD (Open palm) parameters for dreamy stable breathing
      targetInput.spread = 1.0;
      targetInput.twist = Math.sin(demoWave * 0.5) * 0.4;
      targetInput.posX = Math.sin(demoWave * 0.22) * 0.55; // Swing left-right to make wavy liquid tides!
      targetInput.posY = Math.cos(demoWave * 0.3) * 0.15;

    setInterval(executeAutoDemo, 16);


    // ──────────────────────── AI MediaPipe 核心体感驱动 ────────────────────────
    let mediaPipeHands;
    let cameraInstance = null;
    let isCameraActive = false;

    // Initialize MediaPipe Hands official SDK (Exactly identical to the working Christmas Tree!)
    function initMediaPipe() {
      mediaPipeHands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });

      mediaPipeHands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0, // 0 for max speed/performance on laptops
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
      });

      // Hook up results callback
      mediaPipeHands.onResults((results) => {
        if (!isCameraActive) return;

        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
          // Hand lost
          if (targetInput.active) {
            targetInput.active = false;
            gestureState = 'DEMO';
            document.getElementById('pipContainer').classList.remove('controlling');
            
            // Restore default HUD styles
            const hudText = document.getElementById('hudStatusText');
            const hudDot = document.getElementById('hudStatusDot');
            const hudBox = document.getElementById('gestureStatusHUD');
            if (hudText && hudDot && hudBox) {
              hudText.textContent = "SYSTEM STATUS: DEMO FLOW";
              hudDot.style.background = "#00f3ff";
              hudDot.style.boxShadow = "0 0 10px #00f3ff";
              hudBox.style.borderColor = "#00f3ff";
              hudBox.style.boxShadow = "0 0 25px rgba(0, 243, 255, 0.25)";
              hudBox.style.color = "#00f3ff";
            }
          }
          return;
        }

        // Hand Active!
        if (!targetInput.active) {
          targetInput.active = true;
          document.getElementById('pipContainer').classList.add('controlling');
        }

        // Fetch landmarks of the first tracked hand
        const landmarks = results.multiHandLandmarks[0];

        const wrist = landmarks[0];
        const thumbTip = landmarks[4];
        const indexBase = landmarks[5];
        const indexTip = landmarks[8];
        const middleTip = landmarks[12];
        const ringTip = landmarks[16];
        const pinkyTip = landmarks[20];
        const middleBase = landmarks[9];

        if (!wrist || !indexBase || !indexTip || !thumbTip || !middleBase) return;

        // Base scale reference (wrist to index base) - normalized unit
        const baseLength = Math.sqrt(
          Math.pow(indexBase.x - wrist.x, 2) +
          Math.pow(indexBase.y - wrist.y, 2)
        ) || 0.15;

        // Calculate individual finger tip distances to wrist
        const distThumb = Math.sqrt(Math.pow(thumbTip.x - wrist.x, 2) + Math.pow(thumbTip.y - wrist.y, 2));
        const distIndex = Math.sqrt(Math.pow(indexTip.x - wrist.x, 2) + Math.pow(indexTip.y - wrist.y, 2));
        const distMiddle = Math.sqrt(Math.pow(middleTip.x - wrist.x, 2) + Math.pow(middleTip.y - wrist.y, 2));
        const distRing = Math.sqrt(Math.pow(ringTip.x - wrist.x, 2) + Math.pow(ringTip.y - wrist.y, 2));
        const distPinky = Math.sqrt(Math.pow(pinkyTip.x - wrist.x, 2) + Math.pow(pinkyTip.y - wrist.y, 2));

        // 1. PINCH Detection (Thumb tip close to Index tip)
        const pinchDist = Math.sqrt(Math.pow(thumbTip.x - indexTip.x, 2) + Math.pow(thumbTip.y - indexTip.y, 2));
        const isPinching = pinchDist < baseLength * 0.42;

        // 2. POINT Detection (Index finger clearly extended more than middle, ring, and pinky fingers)
        const isPointing = (distIndex > distMiddle + baseLength * 0.22) &&
                           (distIndex > distRing + baseLength * 0.22) &&
                           (distIndex > distPinky + baseLength * 0.22);

        // 3. FIST Detection (All fingers curled tight to wrist)
        const avgTipDist = (distIndex + distMiddle + distRing + distPinky) / 4;
        const isFist = avgTipDist < baseLength * 1.05;

        // 4. SPREAD Detection (All fingers widely extended)
        const isSpread = avgTipDist > baseLength * 1.45;

        // Set state string and smooth scale factor
        if (isFist) {
          gestureState = 'FIST';
          targetInput.spread = 0.0;
        } else if (isPointing) {
          gestureState = 'POINT';
          targetInput.spread = 0.65;
        } else if (isPinching) {
          gestureState = 'PINCH';
          targetInput.spread = 0.45;
        } else if (isSpread) {
          gestureState = 'SPREAD';
          targetInput.spread = 1.0;
        } else {
          gestureState = 'SPREAD'; // fallback
          targetInput.spread = 0.8;
        }

        // Map 2D hand landmark coordinates [0, 1] to 3D Three.js space attractors
        // Mirror X coordinates for intuitive visual hand correspondence
        indexAttractor.set(
          (0.5 - indexTip.x) * 160,
          (0.5 - indexTip.y) * 120,
          indexTip.z * -180
        );

        thumbAttractor.set(
          (0.5 - thumbTip.x) * 160,
          (0.5 - thumbTip.y) * 120,
          thumbTip.z * -180
        );

        // Update Top HUD styles dynamically
        const hudText = document.getElementById('hudStatusText');
        const hudDot = document.getElementById('hudStatusDot');
        const hudBox = document.getElementById('gestureStatusHUD');

        if (hudText && hudDot && hudBox) {
          if (gestureState === 'FIST') {
            hudText.textContent = "SYSTEM STATUS: ACCRETION SINGULARITY";
            hudDot.style.background = "#ff007f"; // raspberry rose-pink
            hudDot.style.boxShadow = "0 0 12px #ff007f";
            hudBox.style.borderColor = "#ff007f";
            hudBox.style.boxShadow = "0 0 25px rgba(255, 0, 127, 0.45)";
            hudBox.style.color = "#ff007f";
          } else if (gestureState === 'POINT') {
            hudText.textContent = "SYSTEM STATUS: CYBER COGNITIVE CITY";
            hudDot.style.background = "#d946ef"; // neon fuchsia
            hudDot.style.boxShadow = "0 0 12px #d946ef";
            hudBox.style.borderColor = "#d946ef";
            hudBox.style.boxShadow = "0 0 25px rgba(217, 70, 239, 0.45)";
            hudBox.style.color = "#d946ef";
          } else if (gestureState === 'PINCH') {
            hudText.textContent = "SYSTEM STATUS: TOKAMAK TOROID FUSION";
            hudDot.style.background = "#f472b6"; // coral pink
            hudDot.style.boxShadow = "0 0 12px #f472b6";
            hudBox.style.borderColor = "#f472b6";
            hudBox.style.boxShadow = "0 0 25px rgba(244, 114, 182, 0.45)";
            hudBox.style.color = "#f472b6";
          } else if (gestureState === 'SPREAD') {
            hudText.textContent = "SYSTEM STATUS: QUANTUM SPREAD";
            hudDot.style.background = "#ec4899"; // sakura pink
            hudDot.style.boxShadow = "0 0 12px #ec4899";
            hudBox.style.borderColor = "#ec4899";
            hudBox.style.boxShadow = "0 0 25px rgba(236, 72, 153, 0.45)";
            hudBox.style.color = "#ec4899";
          }
        }

        // 2. Calculate Twist (手腕旋转角 / Roll)
        const indexBaseJoint = landmarks[5];
        const pinkyBaseJoint = landmarks[17];
        
        if (indexBaseJoint && pinkyBaseJoint) {
          const rotDX = pinkyBaseJoint.x - indexBaseJoint.x;
          const rotDY = pinkyBaseJoint.y - indexBaseJoint.y;
          const tiltAngle = Math.atan2(rotDY, rotDX); // Roll tilt
          targetInput.twist = (tiltAngle + Math.PI/2) * 1.5;
        }

        // 3. Hand position mapping (X, Y mapped to normalized camera coordinate space)
        targetInput.posX = (0.5 - middleBase.x) * 2.0; 
        targetInput.posY = (0.5 - middleBase.y) * 2.0;
      });
    }

    const btnToggleCamera = document.getElementById('btnToggleCamera');
    const webcamVideo = document.getElementById('webcam-video');

    function requestCameraConsent() {
      return window.confirm(
        "摄像头使用说明\n\n" +
        "本页面的 AI 体感功能会在您点击确认后调用本机摄像头，仅用于浏览器本地实时识别手势。\n" +
        "视频画面不会上传服务器、不会保存，也不会用于其他用途。您可以随时关闭摄像头并返回自动演示模式。\n\n" +
        "是否同意开启摄像头？"
      );
    }

    async function startAIWebcam() {
      if (!window.isSecureContext && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        alert("浏览器要求摄像头功能必须在 HTTPS 安全连接下使用。请通过 HTTPS 访问本站，或继续使用自动演示模式。");
        return;
      }
      if (!requestCameraConsent()) {
        return;
      }
      if (typeof Hands === 'undefined') {
        alert("⚠️ 抱歉！官方 MediaPipe AI 核心库尚未成功加载。\n\n星云将继续保持在自转演示（Auto Demo）模式，您可以使用鼠标拖拽互动！");
        return;
      }

      try {
        if (!mediaPipeHands) {
          initMediaPipe();
        }

        // Access the default camera
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240, frameRate: { ideal: 30 } }
        });
        
        webcamVideo.srcObject = stream;
        isCameraActive = true;
        
        cameraInstance = new window.Camera(webcamVideo, {
          onFrame: async () => {
            if (isCameraActive) {
              await mediaPipeHands.send({ image: webcamVideo });
            }
          },
          width: 320,
          height: 240
        });

        await cameraInstance.start();
        
        btnToggleCamera.innerHTML = `<span>关闭 AI 摄像头</span>`;
        btnToggleCamera.style.background = 'rgba(239, 68, 68, 0.2)';
        btnToggleCamera.style.borderColor = '#ef4444';
      } catch (err) {
        console.error("Camera startup error:", err);
        document.getElementById('errorToast').style.display = 'block';
        isCameraActive = false;
      }
    }

    function stopAIWebcam() {
      isCameraActive = false;
      if (cameraInstance) {
        cameraInstance.stop();
        cameraInstance = null;
      }
      if (webcamVideo && webcamVideo.srcObject) {
        webcamVideo.srcObject.getTracks().forEach(track => track.stop());
        webcamVideo.srcObject = null;
      }
      
      targetInput.active = false;
      document.getElementById('pipContainer').classList.remove('controlling');
      
      btnToggleCamera.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> <span>AI 体感</span>`;
      btnToggleCamera.style.background = 'rgba(255,255,255,0.06)';
      btnToggleCamera.style.borderColor = 'rgba(255,255,255,0.18)';
    }

    btnToggleCamera.addEventListener('click', () => {
      if (isCameraActive) {
        stopAIWebcam();
      } else {
        startAIWebcam();
      }
    });

    // Run Engine
    initEngine();
    renderLoop();

    // 摄像头功能仅在用户点击“AI 体感”按钮并明确确认后启动；默认保持自动演示模式。

  </script>
